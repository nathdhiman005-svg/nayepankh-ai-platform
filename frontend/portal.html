<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NayePankh - Staff Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-body">

    <!-- Auth View -->
    <div id="auth-view" class="portal-view">
        <div class="auth-card">
            <div class="auth-header">
                <h2>NayePankh Portal</h2>
                <p>Staff & Management Access</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
            </div>

            <div id="login-form" class="auth-form active">
                <div style="margin-bottom: 1rem; background: var(--primary-50); padding: 0.75rem; border-radius: 0.5rem; text-align: center;">
                    <label style="font-size: 0.85rem; color: var(--primary-700); font-weight: 600;">Demo Accounts (For Testing)</label>
                    <select id="demo-login-select" onchange="fillDemoCredentials()" style="width: 100%; margin-top: 0.5rem; padding: 0.5rem; font-size: 0.9rem;">
                        <option value="">-- Select an account --</option>
                        <option value="head">Head Admin</option>
                        <option value="manager">Manager</option>
                        <option value="staff">Normal Staff</option>
                    </select>
                </div>
                <input type="text" id="login-username" placeholder="Username" pattern="^[a-zA-Z0-9_]+$" title="Only letters, numbers, and underscores allowed" required>
                <div style="position: relative; width: 100%; margin-bottom: 1.5rem;">
                    <input type="password" id="login-password" placeholder="Password" style="width: 100%; padding: 0.75rem; padding-right: 3rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-family: inherit; box-sizing: border-box;" required>
                    <button type="button" onclick="togglePasswordIcon('login-password', this)" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6b7280; padding: 0.25rem; display: flex; align-items: center; justify-content: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <button class="btn primary-btn" onclick="login()" style="width: 100%;">Login</button>
                <p id="login-error" class="error-msg"></p>
            </div>

        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="portal-view hidden">
        <nav class="portal-nav">
            <div class="nav-brand">NayePankh Portal</div>
            <div class="nav-user">
                <span id="user-greeting">Hello, User</span>
                <span id="user-role-badge" class="badge">Role</span>
                <button class="btn outline-btn small" onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="portal-container">
            <aside class="sidebar" id="sidebar">
                <!-- Links injected via JS based on role -->
            </aside>

            <main class="dashboard-content" id="main-content">
                <!-- Content injected via JS based on selected tab -->
            </main>
        </div>
    </div>

    <script src="portal.js?v=2"></script>
</body>
</html>
